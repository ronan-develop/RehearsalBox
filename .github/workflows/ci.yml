name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: rehearsalbox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Audit dependencies
        run: composer audit

      - name: Run PHPUnit
        env:
          DB_TEST_HOST: 127.0.0.1
          DB_TEST_PORT: "3306"
          DB_TEST_NAME: rehearsalbox_test
          DB_TEST_USER: root
          DB_TEST_PASSWORD: root
        run: ./vendor/bin/phpunit --colors=always

  js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test
